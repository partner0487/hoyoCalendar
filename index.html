<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <title>遊戲更新日曆</title>

    <link
      href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css"
      rel="stylesheet"
    />

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  </head>

  <body>
    <div
      id="loadingScreen"
      style="
        position: fixed;
        bottom: 20px;
        right: 20px;
        display: inline-block;
        z-index: 9999;
      "
    >
      <video
        id="loadingVideo"
        autoplay
        muted
        loop
        style="max-width: 200px; max-height: 200px; border-radius: 5px"
      ></video>
    </div>
    <button id="updateBtn" class="update-btn">🔄 更新資料</button>
    <h2>二遊事件更新日曆</h2>
    <div id="calendar"></div>
    <script src="./js/loading.js" type="module"></script>
    <script src="./js/update.js" type="module"></script>
    <style>
      body {
        font-family: system-ui;
        background-color: #e0dfd6;
        margin: 5px;
      }
      #calendar {
        max-width: 1000px; /* ← 關鍵 */
        margin: 0 auto; /* 置中 */
      }
      .fc-event-title {
        font-size: 0.75rem;
        white-space: normal; /* 允許換行 */
      }
      .update-btn {
        position: fixed;
        top: 16px;
        right: 16px;
        padding: 8px 14px;
        font-size: 14px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        background: #222;
        color: white;
      }
      .update-btn:hover {
        background: #444;
      }
    </style>
  </body>
</html>
