<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/assets/logo_black_removebg.png" />
    <title>二遊更新日曆</title>

    <link
      href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css"
      rel="stylesheet"
    />

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  </head>

  <body onload="handleClientLoad()">
    <div
      id="loadingScreen"
      style="
        background-color: #e0dfd6;
        position: fixed;
        bottom: 20px;
        right: 0px;
        display: none;
        z-index: 9999;
      "
    >
      <h1 style="display: flex; justify-content: center; align-items: center">
        更新資料中 請稍後
      </h1>
      <video
        id="loadingVideo"
        src="/loading/loading1.mp4"
        autoplay
        muted
        loop
        style="max-width: 400px; border-radius: 5px"
      >
        您的瀏覽器不支援影片播放。
      </video>
    </div>
    <div class="top-right-btns">
      <!-- 
      <button onclick="signIn()" class="login-btn">登入 Google 帳號</button>
      <button id="exportBtn" class="output-btn">導出到 Google Calendar</button>
      
      開發中
      -->
      <button id="updateBtn" class="update-btn">🔄 更新資料</button>
    </div>
    <h1>
      <img
        src="/assets/logo_white_removebg.png"
        style="height: 50px; vertical-align: middle"
      />
      二遊更新日曆 (目前支援原/鐵/鳴)
    </h1>
    <div id="calendar"></div>

    <footer id="site-footer">
      <div class="footer-content">
        <p>開發人員: 夥伴</p>
        <p>
          GitHub:
          <a href="https://github.com/partner0487/hoyoCalendar" target="_blank"
            >github</a
          >
        </p>
        <p>
          隱私權政策:
          <a
            href="https://hoyo-calendar.vercel.app/Privacy.html"
            target="_blank"
            >查看政策</a
          >
        </p>
      </div>
    </footer>

    <script src="./js/loading.js" type="module"></script>
    <script src="./js/google.js" type="module"></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <link rel="stylesheet" href="./css/btn.css" />
    <link rel="stylesheet" href="./css/calendar.css" />
    <link rel="stylesheet" href="./css/footer.css" />
  </body>
</html>
