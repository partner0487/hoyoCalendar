<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/assets/logo_black_removebg.png" />
    <title>二遊更新日曆</title>

    <link
      href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css"
      rel="stylesheet"
    />

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  </head>

  <body>
    <div
      id="loadingScreen"
      style="
        background-color: #e0dfd6;
        position: fixed;
        bottom: 20px;
        right: 0px;
        display: none;
        z-index: 9999;
      "
    >
      <h1 style="display: flex; justify-content: center; align-items: center">
        更新資料中 請稍後
      </h1>
      <video
        id="loadingVideo"
        src="/loading/loading1.mp4"
        autoplay
        muted
        loop
        style="max-width: 400px; border-radius: 5px"
      >
        您的瀏覽器不支援影片播放。
      </video>
    </div>
    <button id="updateBtn" class="update-btn">🔄 更新資料</button>
    <h1>
      <img src="/assets/logo_white_removebg.png" style="height: 50px; vertical-align: middle" />
      二遊更新日曆 (目前支援原/鐵/鳴)
    </h1>
    <div id="calendar"></div>
    <script src="./js/loading.js" type="module"></script>
    <style>
      body {
        font-family: system-ui;
        background-color: #e0dfd6;
        margin: 5px;
      }
      #calendar {
        max-width: 1000px; /* ← 關鍵 */
        margin: 0 auto; /* 置中 */
      }
      /* 修改 calendar 的格線為黑色 */
      .fc .fc-scrollgrid,
      .fc .fc-scrollgrid section {
        border-color: black;
      }

      .fc .fc-scrollgrid .fc-col-header-cell,
      .fc .fc-scrollgrid .fc-daygrid-day {
        border: 1px solid black;
      }
      .fc .fc-daygrid {
        border-right: 1px solid black;
        border-bottom: 1px solid black;
      }
      .fc .fc-daygrid-body .fc-row:last-child .fc-daygrid-day {
        border-bottom: 1px solid black;
      }
      .fc .fc-daygrid-body .fc-row .fc-daygrid-day:last-child {
        border-right: 1px solid black;
      }
      .fc-event-title {
        font-size: 0.75rem;
        white-space: normal; /* 允許換行 */
      }
      .update-btn {
        position: fixed;
        top: 16px;
        right: 16px;
        padding: 8px 14px;
        font-size: 14px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        background: #222;
        color: white;
      }
      .update-btn:hover {
        background: #444;
      }
    </style>
  </body>
</html>
