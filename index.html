<!doctype html>
<html lang="zh-TW">

<head>
<meta charset="UTF-8" />
<title>遊戲更新日曆</title>

<link
href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css"
rel="stylesheet"
/>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

</head>

<body>

<button id="updateBtn" class="update-btn">🔄 更新資料</button>

<h2>二遊事件更新日曆</h2>

<div id="calendar"></div>

<script>

const gameColors = {
  原神:"#4CAF50",
  鐵道:"#3F51B5",
  鳴潮:"#E91E63"
}

document.addEventListener("DOMContentLoaded",()=>{

  const calendarEl=document.getElementById("calendar")

  const calendar=new FullCalendar.Calendar(calendarEl,{
    initialView:"dayGridMonth",
    locale:"zh-tw",
    events:[]
  })

  calendar.render()

  async function loadCalendarData(url){

    const res=await fetch(url)

    const events=await res.json()

    calendar.removeAllEvents()

    events.forEach(e=>{
      calendar.addEvent({
        title:`${e.game} ${e.title}`,
        start:e.dates,
        color:gameColors[e.game]||"#2196F3"
      })
    })

  }

  loadCalendarData("/events.json")

  document.getElementById("updateBtn")
  .addEventListener("click",async()=>{

    const btn=document.getElementById("updateBtn")

    btn.disabled=true
    btn.textContent="更新中..."

    await loadCalendarData("/api/update")

    btn.disabled=false
    btn.textContent="🔄 更新資料"

  })

})

</script>

</body>
</html>
