<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="./assets/logo_black_removebg.png" />
    <title>二遊更新日曆</title>

    <link
      href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css"
      rel="stylesheet"
    />

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  </head>

  <body>
    <div
      id="loadingScreen"
      style="
        background-color: #e0dfd6;
        position: fixed;
        bottom: 20px;
        right: 0px;
        display: none;
        z-index: 9999;
      "
    >
      <h1 style="display: flex; justify-content: center; align-items: center">
        更新資料中 請稍後
      </h1>
      <video
        id="loadingVideo"
        src="/loading/loading1.mp4"
        autoplay
        muted
        loop
        style="max-width: 400px; border-radius: 5px"
      >
        您的瀏覽器不支援影片播放。
      </video>
    </div>
    <button id="updateBtn" class="update-btn">🔄 更新資料</button>
    <h1>
      <img
        src="./assets/logo_white_removebg.png"
        style="height: 50px; vertical-align: middle"
      />
      二遊更新日曆 (目前支援原/鐵/鳴)
    </h1>
    <div id="calendar"></div>
    <script>
      fetch("./events.json")
        .then((res) => res.json())
        .then((events) => {
          const calendar = new FullCalendar.Calendar(
            document.getElementById("calendar"),
            {
              initialView: "dayGridMonth",
              locale: "zh-tw",

              events: events.map((e) => ({
                title: `${e.game} ${e.title}`,
                start: e.dates,
                color: gameColors[e.game] || "#2196F3",

                extendedProps: {
                  image: e.image,
                },
              })),

              // 🟢 hover 進入
              eventMouseEnter: function (info) {
                const img = info.event.extendedProps.image;
                if (!img) return;

                const tooltip = document.createElement("div");
                tooltip.id = "imgTooltip";

                tooltip.style.position = "fixed";
                tooltip.style.zIndex = "9999";
                tooltip.style.pointerEvents = "none";

                tooltip.innerHTML = `
            <img src="${img}" style="
              width: 300px;
              border-radius: 10px;
              box-shadow: 0 0 10px rgba(0,0,0,0.5);
            ">
          `;

                document.body.appendChild(tooltip);

                function move(e) {
                  tooltip.style.left = e.pageX + 15 + "px";
                  tooltip.style.top = e.pageY + 15 + "px";
                }

                document.addEventListener("mousemove", move);
                info.el._moveHandler = move;
              },

              // 🔴 hover 離開
              eventMouseLeave: function (info) {
                const tooltip = document.getElementById("imgTooltip");
                if (tooltip) tooltip.remove();

                if (info.el._moveHandler) {
                  document.removeEventListener(
                    "mousemove",
                    info.el._moveHandler,
                  );
                }
              },
            },
          );

          calendar.render();
        });
    </script>
    <script src="./js/update.js" type="module"></script>
    <style>
      body {
        font-family: system-ui;
        background-color: #e0dfd6;
        margin: 5px;
      }
      #calendar {
        max-width: 1000px; /* ← 關鍵 */
        margin: 0 auto; /* 置中 */
      }
      /* 修改 calendar 的格線為黑色 */
      .fc .fc-scrollgrid,
      .fc .fc-scrollgrid section {
        border-color: black;
      }

      .fc .fc-scrollgrid .fc-col-header-cell,
      .fc .fc-scrollgrid .fc-daygrid-day {
        border: 1px solid black;
      }
      .fc .fc-daygrid {
        border-right: 1px solid black;
        border-bottom: 1px solid black;
      }
      .fc .fc-daygrid-body .fc-row:last-child .fc-daygrid-day {
        border-bottom: 1px solid black;
      }
      .fc .fc-daygrid-body .fc-row .fc-daygrid-day:last-child {
        border-right: 1px solid black;
      }
      .fc-event-title {
        font-size: 0.75rem;
        white-space: normal; /* 允許換行 */
      }
      .update-btn {
        position: fixed;
        top: 16px;
        right: 16px;
        padding: 8px 14px;
        font-size: 14px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        background: #222;
        color: white;
      }
      .update-btn:hover {
        background: #444;
      }
    </style>
  </body>
</html>
