<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <title>Local 測試日曆</title>

    <link
      href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

    <style>
      body {
        font-family: system-ui;
        margin: 20px;
      }

      #calendar {
        max-width: 1000px;
        margin: auto;
      }

      .fc-event-title {
        font-size: 0.8rem;
        white-space: normal;
      }
    </style>
  </head>
  <body>
    <div
      id="loadingScreen"
      style="
        position: fixed;
        bottom: 20px; /* 距底部距離 */
        right: 20px; /* 距右邊距離 */
        display: inline-block; /* 自動包住影片 */
        z-index: 9999;
      "
    >
      <video
        id="loadingVideo"
        autoplay
        muted
        loop
        style="max-width: 200px; max-height: 200px; border-radius: 5px"
      ></video>
    </div>
    <h2>本地 events.json 測試</h2>
    <div id="calendar"></div>

    <script src="./js/loading.js" type="module"></script>
    <script src="./js/update.js" type="module"></script>
    <style>
      body {
        font-family: system-ui;
        background-color: #e0dfd6;
        margin: 5px;
      }
      #calendar {
        max-width: 1000px; /* ← 關鍵 */
        margin: 0 auto; /* 置中 */
      }
      .fc-event-title {
        font-size: 0.75rem;
        white-space: normal; /* 允許換行 */
      }
      .update-btn {
        position: fixed;
        top: 16px;
        right: 16px;
        padding: 8px 14px;
        font-size: 14px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        background: #222;
        color: white;
      }
      .update-btn:hover {
        background: #444;
      }
    </style>
  </body>
</html>
